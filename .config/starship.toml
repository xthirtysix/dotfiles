format = """
[Óāļ](#5E81AC)\
$directory\
[Óāį](bg:#81A1C1 fg:#5E81AC)\
$git_branch\
[Óāį](fg:#81A1C1 bg:#88C0D0)\
$git_status\
[Óāį](fg:#88C0D0 bg:#D8DEE9)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[Óāį](fg:#D8DEE9 bg:#8FBCBB)\
$docker_context\
[Óāį](fg:#8FBCBB)\
$line_break\
$character\
"""

# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like ÔĄ† to save some space
[username]
show_always = false
style_user = "bg:#EE99A0"
style_root = "bg:#EE99A0"
format = '[$user ]($style)'

[directory]
style = "bg:#5E81AC fg:#2E3440"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "Ôúė"
"Downloads" = "ÔÄô"
"Music" = "ÔĪė"
"Pictures" = "ÔÄĺ"
"Projects" = "ÓěĖ"
# Keep in mind that the order matters. For example:
# "Important Documents" = " ÔúėÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important Ôúė " = " ÔúėÔĄ™ "

# Git
[git_branch]
symbol = "Ôźė"
style = "fg:#2E3440 bg:#81A1C1"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#2E3440 bg:#88C0D0"
format = '[$all_status$ahead_behind]($style)'

